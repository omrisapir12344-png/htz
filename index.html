function getGreeting() {
  const h = new Date().getHours();
  if(h >= 5 && h < 12) return 'בוקר טוב';
  if(h >= 12 && h < 18) return 'צהריים טובים';
  if(h >= 18 && h < 21) return 'ערב טוב';
  return 'לילה טוב';
}


const STORAGE_KEY = 'htz_moked_dashboard_v2';
function loadState(){
  try{ const raw = localStorage.getItem(STORAGE_KEY); if(raw) return JSON.parse(raw); }
  catch(e){ console.error(e); }
  return null;
}
function saveState(state){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e){ console.error(e); }
}

/* Load state from Google Sheets (fetch latest data) */
async function loadStateFromSheets(){
  if(!SHEETS_SYNC_URL) {
    console.log('⚠️ SHEETS_SYNC_URL is empty - skipping Sheets load');
    return null;
  }
  try {
    console.log('📥 Loading state from Sheets...');
    const resp = await fetch(SHEETS_SYNC_URL, {mode:'cors'});
    const data = await resp.json();
    console.log('📊 Sheets response:', data);
    
    if(data.ok && data.state) {
      console.log('✅ State found in Sheets! Keys:', Object.keys(data.state));
      const localState = loadState() || {};
      const mergedState = {...localState, ...data.state};
      console.log('✅ Merged state - userId:', mergedState.userId, 'tasks:', Object.keys(mergedState.tasks || {}).length, 'targets:', Object.keys(mergedState.targets || {}).length);
      saveState(mergedState);
      return mergedState;
    } else if(data.ok && !data.state) {
      console.log('⚠️ Sheets is empty (no state saved yet)');
      return null;
    } else {
      console.error('❌ Sheets returned error:', data.error);
      return null;
    }
  } catch(e) { 
    console.error('❌ Could not load from Sheets:', e);
  }
  return null;
}

/* ============================================================
   GOOGLE SHEETS SYNC (one-way: site -> sheet, backup only)
   Paste the Apps Script "Web app URL" here once deployed.
   Leave empty to disable sync (app works normally without it).
============================================================ */
const SHEETS_SYNC_URL = 'https://script.google.com/macros/s/AKfycbweA7MMcaR6l-x3KRWAza7oSRlTnr5qYjSrCrfEE4Xb1m9nnGD9GmfXMjVIrOeCLIKF/exec';

let _syncTimer = null;
function syncToSheets(state, updatedBy){
  if(!SHEETS_SYNC_URL) {
    console.log('⚠️ SHEETS_SYNC_URL is empty - sync disabled');
    return;
  }
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => {
    console.log('📤 Syncing to Sheets (updated by: ' + updatedBy + ')...');
    fetch(SHEETS_SYNC_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify({ state, updatedBy }),
    })
    .then(() => console.log('✅ Sync to Sheets successful!'))
    .catch(err => console.error('❌ Sheets sync failed:', err));
  }, 2000);
}

function monthKey(date){
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(key){
  const [y,m] = key.split('-');
  const names = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${names[parseInt(m,10)-1]} ${y}`;
}
function shiftMonth(key, delta){
  let [y,m] = key.split('-').map(Number);
  m += delta;
  while(m > 12){ m -= 12; y += 1; }
  while(m < 1){ m += 12; y -= 1; }
  return `${y}-${String(m).padStart(2,'0')}`;
}

/* ============================================================
   GAUGE
============================================================ */
function Gauge({ name, goal, actual, invert, unit }) {
  let pct = goal > 0 ? (invert ? (goal/Math.max(actual,0.0001))*100 : (actual/goal)*100) : 0;
  pct = Math.max(0, Math.min(100, pct));
  const pctR = Math.round(pct);
  const r=56, sw=11, nr=r-sw/2, circ=nr*2*Math.PI, off=circ-(pct/100)*circ;
  let color = pctR>=100 ? C.green : pctR>=85 ? C.teal : C.red;
  return (
    <div className="flex flex-col items-center bg-white rounded-2xl border border-gray-100 shadow-sm p-4 flex-1 min-w-[150px]">
      <div className="relative w-[120px] h-[120px]">
        <svg height={r*2} width={r*2} className="-rotate-90">
          <circle stroke="#EEF2F3" fill="transparent" strokeWidth={sw} r={nr} cx={r} cy={r} />
          <circle stroke={color} fill="transparent" strokeWidth={sw}
            strokeDasharray={circ+' '+circ}
            style={{strokeDashoffset:off, transition:'stroke-dashoffset 0.6s ease'}}
            strokeLinecap="round" r={nr} cx={r} cy={r} />
        </svg>
        <div className="absolute inset-0 flex items-center justify-center">
          <span className="text-xl font-bold" style={{color}}>{pctR}%</span>
        </div>
      </div>
      <p className="mt-2 font-medium text-gray-700 text-sm text-center">{name}</p>
      <p className="text-xs text-gray-400 mt-1">
        ביצוע <span className="font-medium text-gray-600">{actual}{unit}</span> / יעד <span className="font-medium text-gray-600">{goal}{unit}</span>
      </p>
    </div>
  );
}

            {item.label}
          </button>
        ))}
      </nav>
      <div className="p-4 border-t border-gray-100 text-xs text-gray-400 text-center">כל השינויים נשמרים אוטומטית</div>
    </div>
  );
}

/* ============================================================
   TARGETS BOARD (single board display, used inside dashboard)
============================================================ */
function TargetsBoard({ board, title, showCamera, categories = TARGET_CATEGORIES }) {
  const wrapRef = useRef(null);
  const [photo, setPhoto] = useState(false);

  const updatedLabel = board.updatedAt
    ? new Date(board.updatedAt).toLocaleString('he-IL', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
    : 'אין עדכון עדיין';

  return (
    <div ref={wrapRef} className={photo ? 'photo-mode' : ''}>
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3" style={{background:C.tealDark}}>
          <h3 className="font-bold text-white">{title} - יעד מול ביצוע</h3>
          {showCamera && (
            <button onClick={()=>setPhoto(!photo)} className="ui-only text-xs bg-white/15 text-white px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-white/25">
              <Icon name="camera" className="w-4 h-4" /> {photo ? 'חזרה' : 'מצב צילום'}
            </button>
          )}
        </div>
        <p className="px-4 pt-3 text-xs text-gray-400">עודכן לאחרונה: {updatedLabel}</p>
        <div className="flex flex-wrap gap-4 p-4">
          {categories.map(cat => {
            const row = board.data[cat] || {goal:0, actual:0};
            const unit = cat==='תפוקות' ? '' : '%';
            const invert = cat === '% חורגות';
            return (
              <Gauge key={cat} name={cat} goal={row.goal} actual={row.actual} unit={unit} invert={invert} />
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   DASHBOARD SCREEN (target boards only)
============================================================ */

  else if(user.roleKey === 'mnhz') boardsToShow = [user.team];

          <p className="text-sm text-gray-400">{isMnmsh ? getGreeting() + ' ' : ''}שלום {user.name} - {user.roleTitle}</p>

        {(isMnmsh || boardsToShow.length > 1) && (
          <button onClick={()=>setAllPhoto(!allPhoto)} className="text-xs bg-white border border-gray-200 text-gray-600 px-3 py-1.5 rounded-lg flex items-center gap-1 hover:bg-gray-50">

      {boardsToShow.length > 0 && (
        <div className="space-y-4">
          <h3 className="text-sm font-semibold text-gray-500 mb-1 ui-only">יעדים מול ביצוע</h3>

              {photoBoards.map(b => (

/* ============================================================
   CHECKLIST SCREEN (task checklist, separate page for all roles)
============================================================ */
function ChecklistScreen({ user, tasks, setTasks }) {
  const isAdmin = user.roleKey === 'admin';
  const isMnmsh = user.roleKey === 'mnmsh';
  const taskRoleOptions = ['mm','mnhz','mnmsh'];
  const taskRoleLabels = {mm:'מנהלת מוקד', mnhz:'מנהלות צוות', mnmsh:'מנמ"ש / אחמ"ש'};
  const subRoleOptions = isMnmsh ? ['mnm', 'ach'] : [];
  const subRoleLabels = {mnm:'מנהל משמרת (רון)', ach:'אחראי משמרת (אברהים)'};
  
  const [viewRole, setViewRole] = useState('mm');
  const [viewSubRole, setViewSubRole] = useState(user.subRole || 'mnm');
  
  const effectiveRoleKey = isAdmin ? viewRole : user.roleKey;
  const effectiveSubRole = isMnmsh ? viewSubRole : null;

  const groups = tasks[effectiveRoleKey] || {};
  const tabKeys = Object.keys(groups);
  const [activeTab, setActiveTab] = useState(tabKeys[0] || '');
  const [newTaskText, setNewTaskText] = useState('');

  useEffect(()=>{
    if(!tabKeys.includes(activeTab) && tabKeys.length) setActiveTab(tabKeys[0]);
  }, [effectiveRoleKey]);

  const toggleTask = (tab, id) => {
    setTasks(prev => {
      const updated = {...prev};
      updated[effectiveRoleKey] = {...updated[effectiveRoleKey]};
      updated[effectiveRoleKey][tab] = updated[effectiveRoleKey][tab].map(t => t.id===id ? {...t, done:!t.done} : t);
      return updated;
    });
  };
  const addTask = (tab) => {
    if(!newTaskText.trim()) return;
    setTasks(prev => {
      const updated = {...prev};
      updated[effectiveRoleKey] = {...updated[effectiveRoleKey]};
      updated[effectiveRoleKey][tab] = [...(updated[effectiveRoleKey][tab]||[]), {id:'t-'+Date.now(), text:newTaskText.trim(), done:false}];
      return updated;
    });
    setNewTaskText('');
  };
  const deleteTask = (tab, id) => {
    setTasks(prev => {
      const updated = {...prev};
      updated[effectiveRoleKey] = {...updated[effectiveRoleKey]};
      updated[effectiveRoleKey][tab] = updated[effectiveRoleKey][tab].filter(t=>t.id!==id);
      return updated;
    });
  };

  const currentTasks = groups[activeTab] || [];
  const doneCount = currentTasks.filter(t=>t.done).length;

  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-xl font-bold text-gray-800 mb-1">צ'ק-ליסט משימות</h2>
        <p className="text-sm text-gray-400">{isMnmsh ? getGreeting() + ' ' : ''}שלום {user.name} - {user.roleTitle}</p>
      </div>
      <div>
        <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
          <h3 className="text-sm font-semibold text-gray-500">
            {isAdmin ? `משימות - ${taskRoleLabels[viewRole]}` : isMnmsh ? `משימות - ${subRoleLabels[viewSubRole]}` : 'המשימות שלי'}
          </h3>
          {isAdmin && (
            <div className="flex gap-2">
              {taskRoleOptions.map(r => (
                <button key={r} onClick={()=>setViewRole(r)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium border ${viewRole===r ? 'text-white' : 'text-gray-600 bg-white border-gray-200'}`}
                  style={viewRole===r?{background:C.tealDark, borderColor:C.tealDark}:{}}>
                  {taskRoleLabels[r]}
                </button>
              ))}
            </div>
          )}
          {isMnmsh && (
            <div className="flex gap-2">
              {subRoleOptions.map(sr => (
                <button key={sr} onClick={()=>setViewSubRole(sr)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium border ${viewSubRole===sr ? 'text-white' : 'text-gray-600 bg-white border-gray-200'}`}
                  style={viewSubRole===sr?{background:C.tealDark, borderColor:C.tealDark}:{}}>
                  {subRoleLabels[sr]}
                </button>
              ))}
            </div>
          )}
        </div>
        <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
          <div className="flex border-b border-gray-100 overflow-x-auto">
            {tabKeys.map(tab => (
              <button key={tab} onClick={()=>setActiveTab(tab)}
                className={`px-5 py-3 text-sm font-medium border-b-2 whitespace-nowrap transition-colors ${activeTab===tab?'':'border-transparent text-gray-400 hover:text-gray-600'}`}
                style={activeTab===tab?{borderColor:C.tealDark, color:C.tealDark}:{}}>
                {tab}
              </button>
            ))}
          </div>
          <div className="p-4">
            <div className="flex items-center justify-between mb-3">
              <span className="text-xs text-gray-400">{doneCount} / {currentTasks.length} הושלמו</span>
            </div>
            <div className="space-y-2">
              {currentTasks.map(task => (
                <div key={task.id} className="flex items-center gap-3 group">
                  <button onClick={()=>toggleTask(activeTab, task.id)}
                    className="w-5 h-5 rounded-md border-2 flex items-center justify-center flex-shrink-0"
                    style={{borderColor: task.done?C.tealDark:'#D1D5DB', background: task.done?C.tealDark:'transparent'}}>
                    {task.done && <Icon name="check" className="w-3 h-3 text-white" />}
                  </button>
                  <span className={`flex-1 text-sm ${task.done?'line-through text-gray-400':'text-gray-700'}`}>{task.text}</span>
                  <button onClick={()=>deleteTask(activeTab, task.id)} className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400">
                    <Icon name="trash" className="w-4 h-4" />
                  </button>
                </div>
              ))}
              {currentTasks.length===0 && <p className="text-sm text-gray-400 py-4 text-center">אין משימות בקטגוריה זו</p>}
            </div>
            <div className="flex gap-2 mt-4">
              <input value={newTaskText} onChange={e=>setNewTaskText(e.target.value)}
                onKeyDown={e=>e.key==='Enter' && addTask(activeTab)}
                placeholder="משימה חדשה..."
                className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none" />
              <button onClick={()=>addTask(activeTab)} className="px-4 py-2 rounded-lg text-white text-sm font-medium flex items-center gap-1" style={{background:C.orange}}>
                <Icon name="plus" className="w-4 h-4" /> הוספה
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   FEEDBACK TRACKING SCREEN (monthly log per employee)
============================================================ */
function FeedbackScreen({ feedbackLog, setFeedbackLog, user }) {
  const canSwitchTeam = user.roleKey === 'mm' || user.roleKey === 'admin';
  const teamKey = canSwitchTeam ? null : user.team;
  const [viewTeam, setViewTeam] = useState(teamKey || 'team1');
  const team = canSwitchTeam ? viewTeam : teamKey;

  const [month, setMonth] = useState(monthKey(new Date()));
  const [expanded, setExpanded] = useState(null); // employee name currently expanded
  const [newEmpName, setNewEmpName] = useState('');
  const [noteDrafts, setNoteDrafts] = useState({}); // key: `${name}-${type}` -> text
  const [formView, setFormView] = useState(null); // {employee, formId} or null

  const teamData = feedbackLog[team] || { employees: [...(DEFAULT_EMPLOYEES[team]||[])], months: {}, forms: {} };
  const monthData = teamData.months[month] || {};
  const teamForms = teamData.forms || {};

  const getEntries = (name, type) => (monthData[name] && monthData[name][type]) || [];

  const addEntry = (name, type) => {
    const draftKey = `${name}-${type}`;
    const notes = (noteDrafts[draftKey] || '').trim();
    setFeedbackLog(prev => {
      const updated = {...prev};
      const t = updated[team] || { employees: [...(DEFAULT_EMPLOYEES[team]||[])], months: {} };
      const months = {...t.months};
      const md = {...(months[month] || {})};
      const emp = {...(md[name] || {})};
      const list = [...(emp[type] || [])];
      list.push({id:'e-'+Date.now(), date: new Date().toLocaleDateString('he-IL'), notes});
      emp[type] = list;
      md[name] = emp;
      months[month] = md;
      updated[team] = {...t, months};
      return updated;
    });
    setNoteDrafts(prev => ({...prev, [draftKey]: ''}));
  };

  const deleteEntry = (name, type, entryId) => {
    setFeedbackLog(prev => {
      const updated = {...prev};
      const t = updated[team];
      const months = {...t.months};
      const md = {...(months[month] || {})};
      const emp = {...(md[name] || {})};
      emp[type] = (emp[type] || []).filter(e => e.id !== entryId);
      md[name] = emp;
      months[month] = md;
      updated[team] = {...t, months};
      return updated;
    });
  };

  const addEmployee = () => {
    if(!newEmpName.trim()) return;
    setFeedbackLog(prev => {
      const updated = {...prev};
      const t = updated[team] || { employees: [], months: {} };
      updated[team] = {...t, employees: [...t.employees, newEmpName.trim()]};
      return updated;
    });
    setNewEmpName('');
  };

  const removeEmployee = (name) => {
    setFeedbackLog(prev => {
      const updated = {...prev};
      const t = updated[team];
      updated[team] = {...t, employees: t.employees.filter(e => e !== name)};
      return updated;
    });
  };

  const totalForEmployee = (name) => {
    const emp = monthData[name] || {};
    return FEEDBACK_TYPES.reduce((sum, type) => sum + (emp[type]||[]).length, 0);
  };

  const getEmployeeForms = (name) => teamForms[name] || [];

  const createForm = (name) => {
    const newForm = { id:'form-'+Date.now(), date: new Date().toLocaleDateString('he-IL'), data: {...emptyFeedbackForm(), agentName: name} };
    setFeedbackLog(prev => {
      const updated = {...prev};
      const t = updated[team];
      const forms = {...(t.forms||{})};
      forms[name] = [...(forms[name]||[]), newForm];
      updated[team] = {...t, forms};
      return updated;
    });
    setFormView({employee: name, formId: newForm.id});
  };

  const updateForm = (name, formId, newData) => {
    setFeedbackLog(prev => {
      const updated = {...prev};
      const t = updated[team];
      const forms = {...(t.forms||{})};
      forms[name] = (forms[name]||[]).map(f => f.id===formId ? {...f, data: newData} : f);
      updated[team] = {...t, forms};
      return updated;
    });
  };

  const deleteForm = (name, formId) => {
    setFeedbackLog(prev => {
      const updated = {...prev};
      const t = updated[team];
      const forms = {...(t.forms||{})};
      forms[name] = (forms[name]||[]).filter(f => f.id !== formId);
      updated[team] = {...t, forms};
      return updated;
    });
    if(formView && formView.employee===name && formView.formId===formId) setFormView(null);
  };

  if(formView){
    const forms = getEmployeeForms(formView.employee);
    const form = forms.find(f => f.id === formView.formId);
    if(form){
      return (
        <FeedbackFormScreen
          form={form}
          onChange={(newData)=>updateForm(formView.employee, form.id, newData)}
          onBack={()=>setFormView(null)}
          onDelete={()=>deleteForm(formView.employee, form.id)}
        />
      );
    }
  }

  return (
    <div className="space-y-6">
      <div className="flex items-start justify-between flex-wrap gap-3">
        <div>
          <h2 className="text-xl font-bold text-gray-800 mb-1">מעקב משובים</h2>
          <p className="text-sm text-gray-400">סימון שיחות כתף אל כתף, משוב פרונטלי, אישית ובונוס - לפי עובד וחודש</p>
        </div>
        {canSwitchTeam && (
          <div className="flex gap-2">
            {['team1','team2'].map(t => (
              <button key={t} onClick={()=>setViewTeam(t)}
                className={`px-4 py-2 rounded-lg text-sm font-medium border ${viewTeam===t?'text-white':'text-gray-600 bg-white border-gray-200'}`}
                style={viewTeam===t?{background:C.tealDark, borderColor:C.tealDark}:{}}>
                {TEAM_LABELS[t]}
              </button>
            ))}
          </div>
        )}
      </div>

      {/* month navigator */}
      <div className="flex items-center justify-center gap-3 bg-white rounded-2xl border border-gray-100 shadow-sm p-3">
        <button onClick={()=>setMonth(m=>shiftMonth(m,-1))} className="p-2 rounded-lg border border-gray-200 hover:bg-gray-50">
          <Icon name="chevron" className="w-4 h-4 rotate-180" />
        </button>
        <span className="font-bold text-gray-700 min-w-[120px] text-center">{monthLabel(month)}</span>
        <button onClick={()=>setMonth(m=>shiftMonth(m,1))} className="p-2 rounded-lg border border-gray-200 hover:bg-gray-50">
          <Icon name="chevron" className="w-4 h-4" />
        </button>
        {month !== monthKey(new Date()) && (
          <button onClick={()=>setMonth(monthKey(new Date()))} className="text-xs px-3 py-1.5 rounded-lg border border-gray-200 text-gray-500 hover:bg-gray-50 flex items-center gap-1">
            <Icon name="refresh" className="w-3 h-3" /> חזרה לחודש הנוכחי
          </button>
        )}
      </div>

      {/* employees table */}
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <table className="w-full text-sm">
          <thead>
            <tr style={{background:C.tealLight}}>
              <th className="px-4 py-3 text-right font-semibold text-gray-600"></th>
              <th className="px-4 py-3 text-right font-semibold text-gray-600">שם עובד</th>
              {FEEDBACK_TYPES.map(t => <th key={t} className="px-3 py-3 text-center font-semibold text-gray-600">{t}</th>)}
              <th className="px-3 py-3 text-center font-semibold text-gray-600">סה"כ</th>
              <th className="px-3 py-3"></th>
            </tr>
          </thead>
          <tbody>
            {teamData.employees.map(name => {
              const isOpen = expanded === name;
              return (
                <React.Fragment key={name}>
                  <tr className="border-t border-gray-50 hover:bg-gray-50 cursor-pointer" onClick={()=>setExpanded(isOpen ? null : name)}>
                    <td className="px-4 py-2 text-center text-gray-400">
                      <Icon name="chevron" className={`w-4 h-4 transition-transform ${isOpen ? '-rotate-90' : '-rotate-0'}`} />
                    </td>
                    <td className="px-4 py-2 font-medium text-gray-700">{name}</td>
                    {FEEDBACK_TYPES.map(t => (
                      <td key={t} className="px-3 py-2 text-center font-bold" style={{color:C.tealDark}}>{getEntries(name,t).length}</td>
                    ))}
                    <td className="px-3 py-2 text-center font-bold text-gray-700">{totalForEmployee(name)}</td>
                    <td className="px-3 py-2 text-center">
                      <button onClick={(e)=>{e.stopPropagation(); removeEmployee(name);}} className="text-gray-300 hover:text-red-400">
                        <Icon name="trash" className="w-4 h-4" />
                      </button>
                    </td>
                  </tr>
                  {isOpen && (
                    <tr className="border-t border-gray-50" style={{background:C.tealLight}}>
                      <td colSpan={FEEDBACK_TYPES.length+3} className="p-4">
                        <div className="grid gap-4" style={{gridTemplateColumns:'repeat(auto-fit, minmax(220px,1fr))'}}>
                          {FEEDBACK_TYPES.map(type => {
                            const entries = getEntries(name, type);
                            const draftKey = `${name}-${type}`;
                            return (
                              <div key={type} className="bg-white rounded-xl border border-gray-100 p-3">
                                <p className="text-sm font-semibold mb-2" style={{color:C.tealDark}}>{type} ({entries.length})</p>
                                <div className="space-y-1 mb-2 max-h-32 overflow-y-auto">
                                  {entries.map(entry => (
                                    <div key={entry.id} className="flex items-start justify-between gap-2 text-xs bg-gray-50 rounded-lg px-2 py-1.5">
                                      <div>
                                        <p className="font-medium text-gray-600">{entry.date}</p>
                                        {entry.notes && <p className="text-gray-400">{entry.notes}</p>}
                                      </div>
                                      <button onClick={()=>deleteEntry(name, type, entry.id)} className="text-gray-300 hover:text-red-400 flex-shrink-0">
                                        <Icon name="trash" className="w-3 h-3" />
                                      </button>
                                    </div>
                                  ))}
                                  {entries.length===0 && <p className="text-xs text-gray-400">אין רישומים החודש</p>}
                                </div>
                                <div className="flex gap-1">
                                  <input value={noteDrafts[draftKey] || ''} onChange={e=>setNoteDrafts(prev=>({...prev,[draftKey]:e.target.value}))}
                                    placeholder="הערות (אופציונלי)"
                                    className="flex-1 border border-gray-200 rounded-lg px-2 py-1 text-xs" />
                                  <button onClick={()=>addEntry(name, type)} className="px-2 py-1 rounded-lg text-white text-xs font-medium flex items-center gap-1" style={{background:C.orange}}>
                                    <Icon name="check" className="w-3 h-3" /> בוצע
                                  </button>
                                </div>
                              </div>
                            );
                          })}
                        </div>

                        <div className="mt-4 bg-white rounded-xl border border-gray-100 p-3">
                          <div className="flex items-center justify-between mb-2">

                          </div>
                        </div>
                      </td>

              );

          </tbody>
        </table>
        <div className="p-4 border-t border-gray-100 flex gap-2">

  );
}

function TargetsUpdateScreen({ targets, setTargets, wallaTargets, setWallaTargets }) {
  const [board, setBoard] = useState('moked');
  const isWalla = board === 'walla';

  const updateField = (cat, field, value) => {
    if(isWalla){
      setWallaTargets(prev => ({
        ...prev,
        data: {
          ...prev.data,
          [cat]: { ...prev.data[cat], [field]: parseFloat(value) || 0 }
        },
        updatedAt: Date.now(),
      }));
      return;
    }
    setTargets(prev => ({
      ...prev,
      [board]: {
        ...prev[board],
        data: {
          ...prev[board].data,
          [cat]: { ...prev[board].data[cat], [field]: parseFloat(value) || 0 }
        },
        updatedAt: Date.now(),
      }
    }));
  };

  const activeBoard = isWalla ? wallaTargets : targets[board];
  const activeCategories = isWalla ? ["% חורגות"] : TARGET_CATEGORIES;
  const boardLabel = isWalla ? 'וואלה' : TEAM_LABELS[board];

  const updatedLabel = activeBoard.updatedAt
    ? new Date(activeBoard.updatedAt).toLocaleString('he-IL', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
    : 'אין עדכון עדיין';

  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-xl font-bold text-gray-800 mb-1">עדכון יעד מול ביצוע</h2>
        <p className="text-sm text-gray-400">מילוי יומי - בחר את האזור הרלוונטי ועדכן את הנתונים מתחילת החודש ועד יום האתמול</p>
      </div>

      <div className="flex gap-2 flex-wrap">
        {['moked','team1','team2','walla'].map(b => (
          <button key={b} onClick={()=>setBoard(b)}
            className={`px-4 py-2 rounded-lg text-sm font-medium border ${board===b?'text-white':'text-gray-600 bg-white border-gray-200'}`}
            style={board===b?{background:C.tealDark, borderColor:C.tealDark}:{}}>
            {b==='walla' ? 'וואלה' : TEAM_LABELS[b]}
          </button>
        ))}
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="px-4 py-3 flex items-center justify-between" style={{background:C.tealDark}}>
          <h3 className="font-bold text-white">{boardLabel} - עדכון נתונים</h3>
          <span className="text-xs text-white/80">עודכן לאחרונה: {updatedLabel}</span>
        </div>
        <div className="p-4 space-y-3">
          {activeCategories.map(cat => {
            const row = activeBoard.data[cat];
            const invert = cat === '% חורגות';
            const pct = row.goal > 0 ? Math.round((invert ? (row.goal/Math.max(row.actual,0.0001)) : (row.actual/row.goal))*100) : 0;
            const pctClamped = Math.max(0, Math.min(100, pct));
            const color = pctClamped>=100 ? C.green : pctClamped>=85 ? C.teal : C.red;
            return (
              <div key={cat} className="flex flex-wrap items-center gap-3 p-3 rounded-xl" style={{background:C.tealLight}}>
                <span className="w-40 text-sm font-semibold" style={{color:C.tealDark}}>{cat}</span>
                <label className="text-xs text-gray-500">יעד</label>
                <input type="number" value={row.goal} onChange={e=>updateField(cat,'goal',e.target.value)}
                  className="w-24 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-center bg-white" />
                <label className="text-xs text-gray-500">ביצוע</label>
                <input type="number" value={row.actual} onChange={e=>updateField(cat,'actual',e.target.value)}
                  className="w-24 border border-gray-200 rounded-lg px-2 py-1.5 text-sm text-center bg-white" />
                <span className="text-sm font-bold px-2 py-1 rounded-lg bg-white" style={{color}}>{pctClamped}% עמידה</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

        <p className="text-center text-xs text-gray-400 mt-3">לצילום: Win+Shift+S או Cmd+Shift+4</p>
      </div>
    </div>
  );
}

/* ============================================================
   HOURLY / SHIFT STATUS SCREEN (single, whole floor)
============================================================ */
function HourlyStatusScreen({ hourly, setHourly, user }) {
  const [photo, setPhoto] = useState(false);

  const updateQueue = (name, field, value) => {
    setHourly(prev => ({...prev, queues: {...prev.queues, [name]: {...prev.queues[name], [field]: value}}, updatedAt: Date.now()}));
  };
  const updateDisplay = (name, field, value) => {
    setHourly(prev => ({...prev, displays: {...prev.displays, [name]: {...prev.displays[name], [field]: value}}, updatedAt: Date.now()}));
  };
  const clearAll = () => setHourly(defaultHourlyStatus());

  const pctAnswer = (q) => {
    const inV = parseFloat(q.in)||0, ans = parseFloat(q.answered)||0;
    return inV>0 ? Math.round((ans/inV)*100) : 0;
  };

  const now = new Date();
  const timeStr = now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
  const updatedLabel = hourly.updatedAt
    ? new Date(hourly.updatedAt).toLocaleString('he-IL', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})
    : 'אין עדכון עדיין';

  return (
    <div className={photo ? 'photo-mode' : ''}>
      <div className="flex items-center justify-between flex-wrap gap-3 mb-4 ui-only">
        <div>
          <h2 className="text-xl font-bold text-gray-800 mb-1">סטטוס שעתי</h2>
          <p className="text-sm text-gray-400">תורים טלפוניים ותצוגות - כלל המוקד, מתעדכן כל שעתיים - עודכן לאחרונה: {updatedLabel}</p>
        </div>
        <div className="flex gap-2">
          <button onClick={clearAll} className="px-4 py-2 rounded-lg text-sm font-medium border border-gray-200 bg-white text-gray-600">ניקוי</button>
          <button onClick={()=>setPhoto(!photo)} className="px-4 py-2 rounded-lg text-sm font-medium text-white flex items-center gap-1" style={{background:C.tealDark}}>
            <Icon name="camera" className="w-4 h-4" /> {photo ? 'חזרה לעריכה' : 'מצב צילום'}
          </button>
        </div>
      </div>

      <div className="bg-white rounded-2xl p-5 shadow-sm" style={{boxShadow:'0 4px 18px rgba(0,0,0,0.06)'}}>
        <div className="flex items-center justify-between border-b-2 pb-4 mb-4 flex-wrap gap-3" style={{borderColor:C.tealLight}}>
          <div className="w-11 h-11 rounded-xl flex items-center justify-center text-white font-bold flex-shrink-0" style={{background:C.dark}}>
            h<span style={{fontSize:'0.8em'}}>t</span><span style={{fontSize:'0.6em', position:'relative', top:'-4px'}}>z</span>
          </div>
          <div className="text-center flex-1">
            <h2 className="text-lg font-bold text-gray-800">סטטוס שעתי - מוקד הייטקזון</h2>
          </div>
          <div className="w-11"></div>
        </div>

        <div className="rounded-lg text-white px-4 py-2 flex items-center justify-between flex-wrap gap-3 mb-4 font-semibold text-sm" style={{background:C.tealDark}}>
          <span className="bg-white/15 rounded-lg px-3 py-1">ממלא: {user.name}</span>
          <span className="bg-white rounded-lg px-4 py-1 text-lg font-bold" style={{color:C.dark}}>{timeStr}</span>
          <span className="bg-white/15 rounded-lg px-3 py-1">סטטוס שעה</span>
        </div>

        {/* QUEUES + DISPLAYS side by side */}
        <div className="grid gap-4 mb-2" style={{gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))'}}>
          <div>
            <div className="rounded-t-lg px-3 py-1.5 font-semibold text-white text-xs" style={{background:C.tealDark}}>תורים טלפוניים</div>
            <div className="rounded-b-lg overflow-x-auto" style={{background:C.tealLight}}>
              <table className="w-full text-xs">
                <thead>
                  <tr className="text-gray-500">
                    <th className="px-2 py-1.5 text-right font-medium">שם תור</th>
                    <th className="px-1 py-1.5 text-center font-medium">נכנסות</th>
                    <th className="px-1 py-1.5 text-center font-medium">נענות</th>
                    <th className="px-1 py-1.5 text-center font-medium">% מענה</th>
                  </tr>
                </thead>
                <tbody>
                  {QUEUE_NAMES.map(name => {
                    const q = hourly.queues?.[name] || {in:'', answered:''};
                    const pct = pctAnswer(q);
                    const pctColor = pct >= 90 ? C.green : pct >= 75 ? C.orange : C.red;
                    return (
                      <tr key={name} className="border-t" style={{borderColor:'#cdeee5'}}>
                        <td className="px-2 py-1 font-semibold text-gray-600 whitespace-nowrap">{name}</td>
                        <td className="px-1 py-1"><input value={q.in} onChange={e=>updateQueue(name,'in',e.target.value)} placeholder="0" className="w-12 text-center border border-gray-200 rounded p-0.5 bg-white text-xs" /></td>
                        <td className="px-1 py-1"><input value={q.answered} onChange={e=>updateQueue(name,'answered',e.target.value)} placeholder="0" className="w-12 text-center border border-gray-200 rounded p-0.5 bg-white text-xs" /></td>
                        <td className="px-1 py-1 text-center font-bold" style={{color:pctColor}}>{pct}%</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          <div>
            <div className="rounded-t-lg px-3 py-1.5 font-semibold text-white text-xs" style={{background:C.tealDark}}>תצוגות</div>
            <div className="rounded-b-lg overflow-x-auto" style={{background:C.tealLight}}>
              <table className="w-full text-xs">
                <thead>
                  <tr className="text-gray-500">
                    <th className="px-2 py-1.5 text-right font-medium">שם תצוגה</th>
                    <th className="px-1 py-1.5 text-center font-medium">כמות</th>
                    <th className="px-1 py-1.5 text-center font-medium">חולקו</th>
                  </tr>
                </thead>
                <tbody>
                  {DISPLAY_NAMES.map(name => {
                    const d = hourly.displays?.[name] || {qty:'', distributed:''};
                    return (
                      <tr key={name} className="border-t" style={{borderColor:'#cdeee5'}}>
                        <td className="px-2 py-1 font-semibold text-gray-600 whitespace-nowrap">{name}</td>
                        <td className="px-1 py-1"><input value={d.qty} onChange={e=>updateDisplay(name,'qty',e.target.value)} placeholder="0" className="w-12 text-center border border-gray-200 rounded p-0.5 bg-white text-xs" /></td>
                        <td className="px-1 py-1"><input value={d.distributed} onChange={e=>updateDisplay(name,'distributed',e.target.value)} placeholder="0" className="w-12 text-center border border-gray-200 rounded p-0.5 bg-white text-xs" /></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        {/* TZAKLA PROCEDURE */}
        <div className="rounded-lg mt-4 overflow-hidden">
          <div className="rounded-t-lg px-3 py-1.5 font-semibold text-white text-xs" style={{background:C.tealDark}}>נוהל צאקלה</div>
          <div className="rounded-b-lg p-3" style={{background:C.tealLight}}>
            <div className="space-y-2">
              <div className="flex items-center gap-2">
                <label className="text-xs font-semibold text-gray-600 min-w-fit">כמות פניות שאותרו:</label>
                <input value={hourly.tzakla?.found || ''} onChange={e=>setHourly(prev=>({...prev, tzakla: {...prev.tzakla, found: e.target.value}, updatedAt: Date.now()}))} 
                  placeholder="0" className="w-20 text-center border border-gray-200 rounded p-1 bg-white text-xs" />
              </div>
              <div className="flex items-center gap-2">
                <label className="text-xs font-semibold text-gray-600 min-w-fit">כמות פניות בטיפול:</label>
                <input value={hourly.tzakla?.inProgress || ''} onChange={e=>setHourly(prev=>({...prev, tzakla: {...prev.tzakla, inProgress: e.target.value}, updatedAt: Date.now()}))} 
                  placeholder="0" className="w-20 text-center border border-gray-200 rounded p-1 bg-white text-xs" />
              </div>
              <div className="flex items-center gap-2">
                <input type="checkbox" checked={hourly.tzakla?.reported || false} onChange={e=>setHourly(prev=>({...prev, tzakla: {...prev.tzakla, reported: e.target.checked}, updatedAt: Date.now()}))} 
                  className="w-4 h-4 rounded border-gray-200" id="tzakla-reported" />
                <label htmlFor="tzakla-reported" className="text-xs font-semibold text-gray-600">נשלח בתפוצה של כולם והועלה לקובץ</label>
              </div>
            </div>
          </div>
        </div>

        <p className="text-center text-xs text-gray-400 mt-3">מתמלא אוטומטית = אפור &nbsp;|&nbsp; לצילום: Win+Shift+S או Cmd+Shift+4</p>
      </div>
    </div>
  );
}

/* ============================================================
   DISPLAYS / LINKS SCREEN (shared, editable by everyone)
============================================================ */
function LinksScreen({ links, setLinks }) {
  const [newName, setNewName] = useState('');
  const [newUrl, setNewUrl] = useState('');
  const [editingId, setEditingId] = useState(null);
  const [editName, setEditName] = useState('');
  const [editUrl, setEditUrl] = useState('');

  const addLink = () => {
    if(!newName.trim() || !newUrl.trim()) return;
    setLinks(prev => [...prev, {id:'lnk-'+Date.now(), name:newName.trim(), url:newUrl.trim()}]);
    setNewName(''); setNewUrl('');
  };
  const deleteLink = (id) => setLinks(prev => prev.filter(l => l.id !== id));
  const startEdit = (link) => { setEditingId(link.id); setEditName(link.name); setEditUrl(link.url); };
  const saveEdit = () => {
    setLinks(prev => prev.map(l => l.id===editingId ? {...l, name:editName.trim(), url:editUrl.trim()} : l));
    setEditingId(null);
  };

  return (
    <div className="space-y-6">
      <div>
        <h2 className="text-xl font-bold text-gray-800 mb-1">תצוגות</h2>
        <p className="text-sm text-gray-400">קישורים לתצוגות חיות - חשוף לכל המשתמשים, ניתן להוספה ועריכה</p>
      </div>

      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div className="divide-y divide-gray-50">
          {links.map(link => (
            <div key={link.id} className="flex items-center gap-3 px-4 py-3">
              {editingId === link.id ? (
                <>
                  <input value={editName} onChange={e=>setEditName(e.target.value)} placeholder="שם התצוגה"
                    className="flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-sm" />
                  <input value={editUrl} onChange={e=>setEditUrl(e.target.value)} placeholder="כתובת URL"
                    className="flex-1 border border-gray-200 rounded-lg px-2 py-1.5 text-sm" />
                  <button onClick={saveEdit} className="px-3 py-1.5 rounded-lg text-white text-xs font-medium" style={{background:C.tealDark}}>שמירה</button>
                </>
              ) : (
                <>
                  <Icon name="link" className="w-4 h-4 flex-shrink-0" style={{color:C.tealDark}} />
                  <a href={link.url} target="_blank" rel="noreferrer" className="flex-1 font-medium text-gray-700 hover:underline" style={{color:C.tealDark}}>
                    {link.name}
                  </a>
                  <button onClick={()=>startEdit(link)} className="text-gray-300 hover:text-gray-500">
                    <Icon name="edit" className="w-4 h-4" />
                  </button>
                  <button onClick={()=>deleteLink(link.id)} className="text-gray-300 hover:text-red-400">
                    <Icon name="trash" className="w-4 h-4" />
                  </button>
                </>
              )}
            </div>
          ))}
          {links.length===0 && <p className="text-sm text-gray-400 py-6 text-center">אין תצוגות עדיין</p>}
        </div>
        <div className="p-4 border-t border-gray-100 flex flex-wrap gap-2">
          <input value={newName} onChange={e=>setNewName(e.target.value)} placeholder="שם התצוגה"
            className="flex-1 min-w-[140px] border border-gray-200 rounded-lg px-3 py-2 text-sm" />
          <input value={newUrl} onChange={e=>setNewUrl(e.target.value)} placeholder="כתובת URL"
            className="flex-1 min-w-[140px] border border-gray-200 rounded-lg px-3 py-2 text-sm" />
          <button onClick={addLink} className="px-4 py-2 rounded-lg text-white text-sm font-medium flex items-center gap-1" style={{background:C.tealDark}}>
            <Icon name="plus" className="w-4 h-4" /> הוספת תצוגה
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   LOGIN SCREEN (email-based identification)
============================================================ */
function LoginScreen({ onLogin }) {
  const [email, setEmail] = useState('');
  const [error, setError] = useState('');

  const handleLogin = () => {
    const match = USERS.find(u => u.email.toLowerCase() === email.trim().toLowerCase());
    if(!match){
      setError('כתובת המייל לא נמצאה במערכת. פנה למנהל המערכת.');
      return;
    }
    setError('');
    onLogin(match.id);
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:'#F9FAFB'}}>
      <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-8 w-full max-w-sm text-center">
        <div className="w-14 h-14 rounded-xl flex items-center justify-center text-white font-bold mx-auto mb-4" style={{background:C.dark}}>
          h<span style={{fontSize:'0.8em'}}>t</span><span style={{fontSize:'0.6em', position:'relative', top:'-4px'}}>z</span>
        </div>
        <h2 className="text-lg font-bold text-gray-800 mb-1">מוקד הייטקזון</h2>
        <p className="text-sm text-gray-400 mb-5">היכנס עם כתובת המייל הארגונית שלך</p>
        <input
          type="email"
          value={email}
          onChange={e=>{setEmail(e.target.value); setError('');}}
          onKeyDown={e=>e.key==='Enter' && handleLogin()}
          list="user-emails"
          placeholder="name@htz.co.il"
          className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-center mb-3 focus:outline-none"
        />
        <datalist id="user-emails">
          {USERS.map(u => <option key={u.id} value={u.email} />)}
        </datalist>
        {error && <p className="text-xs mb-3" style={{color:C.red}}>{error}</p>}
        <button onClick={handleLogin} className="w-full px-4 py-2 rounded-lg text-white text-sm font-medium" style={{background:C.tealDark}}>
          כניסה
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   PERMANENT REMINDER BANNER - "נוהל צ'אקלקצה" (mnmsh/achmsh)
============================================================ */
function ChaklaktzaBanner() {
  return (
    <div className="flex items-center gap-3 px-4 py-2.5 text-sm font-medium text-white no-print" style={{background:C.orange}}>
      <Icon name="bell" className="w-5 h-5 flex-shrink-0" />
      <span>
        <strong>נוהל צ'אקלקצה:</strong> יש לבצע בדיקה בכל בוקר, לעדכן את הפניות שנמצאו בקובץ ה-Sheets הנפרד שלכם, ולאחר מכן לדווח לכל הצוות.
      </span>
    </div>
  );
}

/* ============================================================
   MAIN APP
============================================================ */
function App() {
  const persisted = loadState();
  const [userId, setUserId] = useState(persisted?.userId || null);
  const [current, setCurrent] = useState('dashboard');
  const [mobileOpen, setMobileOpen] = useState(false);
  const [tasks, setTasks] = useState(persisted?.tasks || TASKS_DEFAULT);
  const [targets, setTargets] = useState(persisted?.targets || TARGETS_DEFAULT);
  const [wallaTargets, setWallaTargets] = useState(persisted?.wallaTargets || WALLA_TARGETS_DEFAULT);
  const [manpower, setManpower] = useState(persisted?.manpower || defaultManpowerStatus());
  const [hourly, setHourly] = useState(persisted?.hourly || defaultHourlyStatus());
  const [feedbackLog, setFeedbackLog] = useState(persisted?.feedbackLog || defaultFeedbackLog());
  const [links, setLinks] = useState(persisted?.links || defaultLinks());

  const user = USERS.find(u => u.id === userId);

  // Load latest state from Google Sheets on mount
  useEffect(() => {
    loadStateFromSheets().then(sheetState => {
      if(sheetState) {
        if(sheetState.userId) setUserId(sheetState.userId);
        if(sheetState.tasks) setTasks(sheetState.tasks);
        if(sheetState.targets) setTargets(sheetState.targets);
        if(sheetState.wallaTargets) setWallaTargets(sheetState.wallaTargets);
        if(sheetState.manpower) setManpower(sheetState.manpower);
        if(sheetState.hourly) setHourly(sheetState.hourly);
        if(sheetState.feedbackLog) setFeedbackLog(sheetState.feedbackLog);
        if(sheetState.links) setLinks(sheetState.links);
      }
    });
  }, []);

  useEffect(() => {
    if(!user) return;
    const allowed = {
      mm: ['dashboard','checklist','feedback','manpower','hourly','links'],
      mnhz: ['dashboard','checklist','feedback','links'],
      mnmsh: ['dashboard','checklist','targets','manpower','hourly','links'],
      admin: ['dashboard','checklist','feedback','targets','manpower','hourly','links'],
    };
    if(!allowed[user.roleKey].includes(current)) setCurrent('dashboard');
  }, [userId]);

  useEffect(() => {
    const state = {userId, tasks, targets, wallaTargets, manpower, hourly, feedbackLog, links};
    saveState(state);
    if(user) syncToSheets(state, user.name);
  }, [userId, tasks, targets, wallaTargets, manpower, hourly, feedbackLog, links]);


  if(!user){
    return <LoginScreen onLogin={(id)=>setUserId(id)} />;
  }

  const handleLogout = () => setUserId(null);


  return (
    <div className="flex min-h-screen" style={{background:'#F9FAFB'}}>
      <Sidebar current={current} setCurrent={setCurrent} user={user} onLogout={handleLogout} mobileOpen={mobileOpen} setMobileOpen={setMobileOpen} />
      {mobileOpen && <div className="fixed inset-0 bg-black/30 z-30 lg:hidden no-print" onClick={()=>setMobileOpen(false)} />}
      <div className="flex-1 min-w-0">
        <div className="lg:hidden no-print flex items-center justify-between p-4 bg-white border-b border-gray-100 sticky top-0 z-20">
          <div className="flex items-center gap-2">
            <div className="w-9 h-9 rounded-lg flex items-center justify-center text-white font-bold text-sm" style={{background:C.dark}}>htz</div>
            <span className="font-bold text-gray-800">מוקד הייטקזון</span>
          </div>
          <button onClick={()=>setMobileOpen(true)} className="p-2 rounded-lg border border-gray-200">
            <Icon name="chevron" className="w-5 h-5 rotate-90" />
          </button>
        </div>
        {user.roleKey === 'mnmsh' && <ChaklaktzaBanner />}
        <main className="p-4 lg:p-8 max-w-6xl mx-auto">
          {current==='dashboard' && <DashboardScreen user={user} targets={targets} wallaTargets={wallaTargets} />}
          {current==='checklist' && <ChecklistScreen user={user} tasks={tasks} setTasks={setTasks} />}
          {current==='feedback' && <FeedbackScreen feedbackLog={feedbackLog} setFeedbackLog={setFeedbackLog} user={user} />}
          {current==='targets' && <TargetsUpdateScreen targets={targets} setTargets={setTargets} wallaTargets={wallaTargets} setWallaTargets={setWallaTargets} />}
          {current==='manpower' && <ManpowerStatusScreen manpower={manpower} setManpower={setManpower} user={user} />}
          {current==='hourly' && <HourlyStatusScreen hourly={hourly} setHourly={setHourly} user={user} />}
          {current==='links' && <LinksScreen links={links} setLinks={setLinks} />}
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
